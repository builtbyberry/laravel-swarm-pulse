name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    name: PHP 8.5 - Laravel 13
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          ini-values: memory_limit=1G

      # Requires builtbyberry/laravel-swarm ^0.17, which resolves once that
      # release is tagged. Until then this job is expected to fail at install.
      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Execute tests
        run: composer test

      - name: Execute static analysis
        run: composer analyse

      - name: Execute code style check
        run: composer lint
